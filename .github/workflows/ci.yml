name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  verify:
    name: Rust checks and PostgreSQL tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agnt5_test
          POSTGRES_USER: agnt5
          POSTGRES_PASSWORD: agnt5
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agnt5 -d agnt5_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked

      - name: Run unit tests
        run: cargo test --workspace --locked

      - name: Run PostgreSQL integration tests
        env:
          AGNT5_TEST_DATABASE_URL: postgres://agnt5:agnt5@127.0.0.1:5432/agnt5_test
        run: >-
          cargo test -p agnt5-postgres --locked
          --features integration-tests --test postgres

      - name: Build release binary
        run: cargo build --release --locked -p agnt5-runtime

      - name: Upload runtime binary
        uses: actions/upload-artifact@v4
        with:
          name: agnt5-runtime-linux-x86_64
          path: target/release/agnt5-runtime
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: agnt5/runtime:ci
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
