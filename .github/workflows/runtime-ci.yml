name: Runtime CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  protocol:
    name: Protocol and Go bindings
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: 1.23.x
          cache-dependency-path: gen/go/go.sum

      - name: Install pinned protocol tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.57.2
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - name: Validate protobuf modules
        working-directory: proto
        run: |
          buf format -d --exit-code
          buf lint
          buf build

      - name: Reject public protocol breaking changes
        working-directory: proto
        run: |
          latest_tag="$(git tag --list 'protocol/v*' --sort=-version:refname | head -n 1)"
          if [[ -n "${latest_tag}" ]]; then
            buf breaking \
              --path agnt5/protocol/v2 \
              --against "../.git#tag=${latest_tag},subdir=proto"
          fi

      - name: Regenerate Go bindings
        working-directory: proto
        run: buf generate --template buf.gen.go.yaml

      - name: Verify Go module
        working-directory: gen/go
        run: |
          go mod tidy
          go test ./...

      - name: Reject generated drift
        run: |
          if [[ -n "$(git status --porcelain -- gen/go)" ]]; then
            git status --short -- gen/go
            exit 1
          fi

  verify:
    name: Rust checks and PostgreSQL tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agnt5_test
          POSTGRES_USER: agnt5
          POSTGRES_PASSWORD: agnt5
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agnt5 -d agnt5_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: ci
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked

      - name: Run unit tests
        run: cargo test --workspace --locked

      - name: Package public Rust protocol crate
        run: cargo package --locked -p agnt5-proto

      - name: Run PostgreSQL integration tests
        env:
          AGNT5_TEST_DATABASE_URL: postgres://agnt5:agnt5@127.0.0.1:5432/agnt5_test
        run: >-
          cargo test -p agnt5-postgres --locked
          --features integration-tests --test postgres

      - name: Build release binary
        run: cargo build --release --locked -p agnt5-runtime

      - name: Upload runtime binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: agnt5-runtime-linux-x86_64
          path: target/release/agnt5-runtime
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build runtime image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: false
          tags: agnt5/runtime:ci
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
