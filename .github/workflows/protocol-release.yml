name: Protocol Release

on:
  push:
    tags:
      - "protocol/v*"

permissions:
  contents: read

concurrency:
  group: protocol-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  BUF_VERSION: v1.57.2
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.6.1

jobs:
  validate:
    name: Validate release projections
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: 1.23.x
          cache-dependency-path: gen/go/go.sum

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: protocol-release

      - name: Install pinned protocol tools
        env:
          GOTOOLCHAIN: auto
        run: |
          go install "github.com/bufbuild/buf/cmd/buf@${BUF_VERSION}"
          go install "google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}"
          go install "google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_VERSION}"

      - name: Validate release tag and version
        id: version
        run: |
          version="${GITHUB_REF_NAME#protocol/v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "agnt5-proto") | .version')"
          if [[ -z "${version}" || "${version}" != "${crate_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match agnt5-proto ${crate_version}." >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Protocol releases must point to a commit already on main." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate protobuf modules
        working-directory: proto
        run: |
          buf format -d --exit-code
          buf lint
          buf build

      - name: Reject public protocol breaking changes
        working-directory: proto
        run: |
          previous_tag="$(git tag --list 'protocol/v*' --sort=-version:refname | grep -Fvx "${GITHUB_REF_NAME}" | head -n 1)"
          if [[ -n "${previous_tag}" ]]; then
            buf breaking \
              --path agnt5/protocol/v2 \
              --against "../.git#tag=${previous_tag},subdir=proto"
          fi

      - name: Regenerate Go bindings
        working-directory: proto
        run: buf generate --template buf.gen.go.yaml

      - name: Verify Go projection
        working-directory: gen/go
        run: |
          go mod tidy
          go test ./...
          go vet ./...
          go mod verify

      - name: Reject generated drift
        run: |
          if [[ -n "$(git status --porcelain -- gen/go)" ]]; then
            git status --short -- gen/go
            exit 1
          fi

      - name: Package Rust projection
        run: cargo package --locked -p agnt5-proto

      - name: Build canonical descriptor
        working-directory: proto
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ../dist/protocol
          descriptor="agnt5-protocol-v${VERSION}.binpb"
          buf build \
            --path agnt5/protocol/v2 \
            --as-file-descriptor-set \
            --exclude-source-info \
            -o "../dist/protocol/${descriptor}"
          cd ../dist/protocol
          sha256sum "${descriptor}" > "${descriptor}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: protocol-v${{ steps.version.outputs.version }}
          path: dist/protocol/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish protocol release
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: protocol-release
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      CRATES_IO_BOOTSTRAP_TOKEN: ${{ secrets.CRATES_IO_BOOTSTRAP_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: protocol-v${{ needs.validate.outputs.version }}
          path: dist/protocol

      - name: Probe crates.io
        id: crates_io
        run: |
          crate_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' https://crates.io/api/v1/crates/agnt5-proto)"
          version_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://crates.io/api/v1/crates/agnt5-proto/${VERSION}")"

          case "${crate_status}" in
            200) echo "crate_exists=true" >> "${GITHUB_OUTPUT}" ;;
            404) echo "crate_exists=false" >> "${GITHUB_OUTPUT}" ;;
            *) echo "Unexpected crates.io status ${crate_status}." >&2; exit 1 ;;
          esac
          case "${version_status}" in
            200) echo "version_exists=true" >> "${GITHUB_OUTPUT}" ;;
            404) echo "version_exists=false" >> "${GITHUB_OUTPUT}" ;;
            *) echo "Unexpected crates.io version status ${version_status}." >&2; exit 1 ;;
          esac

      - name: Authenticate with crates.io trusted publishing
        if: steps.crates_io.outputs.crate_exists == 'true' && steps.crates_io.outputs.version_exists != 'true'
        id: crates_auth
        uses: rust-lang/crates-io-auth-action@v1.0.5

      - name: Bootstrap agnt5-proto on crates.io
        if: steps.crates_io.outputs.crate_exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_BOOTSTRAP_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "The first release requires the protocol-release environment secret CRATES_IO_BOOTSTRAP_TOKEN." >&2
            exit 1
          fi
          cargo publish --locked -p agnt5-proto

      - name: Publish agnt5-proto with trusted publishing
        if: steps.crates_io.outputs.crate_exists == 'true' && steps.crates_io.outputs.version_exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token }}
        run: cargo publish --locked -p agnt5-proto

      - name: Reuse existing agnt5-proto release
        if: steps.crates_io.outputs.version_exists == 'true'
        run: echo "agnt5-proto ${VERSION} is already published; continuing idempotently."

      - name: Create immutable Go module tag
        run: |
          go_tag="gen/go/v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/${go_tag}"; then
            tagged_commit="$(git rev-list -n 1 "${go_tag}")"
            if [[ "${tagged_commit}" != "${GITHUB_SHA}" ]]; then
              echo "${go_tag} already points to ${tagged_commit}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${go_tag}" "${GITHUB_SHA}" -m "AGNT5 Go protocol v${VERSION}"
            git push origin "refs/tags/${go_tag}"
          fi

      - name: Create GitHub protocol release
        run: |
          descriptor="agnt5-protocol-v${VERSION}.binpb"
          digest="$(cut -d ' ' -f 1 "dist/protocol/${descriptor}.sha256")"
          notes="${RUNNER_TEMP}/protocol-release-notes.md"
          {
            echo "Canonical AGNT5 protocol v${VERSION}."
            echo
            echo "- Rust crate: \`agnt5-proto ${VERSION}\`"
            echo "- Go module: \`github.com/agnt5dev/runtime/gen/go@v${VERSION}\`"
            echo "- Descriptor SHA-256: \`${digest}\`"
            echo "- Source commit: \`${GITHUB_SHA}\`"
          } > "${notes}"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            existing_assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"
            for file in "dist/protocol/${descriptor}" "dist/protocol/${descriptor}.sha256"; do
              if ! grep -Fxq "$(basename "${file}")" <<< "${existing_assets}"; then
                gh release upload "${GITHUB_REF_NAME}" "${file}"
              fi
            done
          else
            release_args=(
              "${GITHUB_REF_NAME}"
              "dist/protocol/${descriptor}"
              "dist/protocol/${descriptor}.sha256"
              --verify-tag
              --title "AGNT5 Protocol v${VERSION}"
              --notes-file "${notes}"
            )
            if [[ "${VERSION}" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi
