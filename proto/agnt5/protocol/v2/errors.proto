syntax = "proto3";

package agnt5.protocol.v2;

import "google/protobuf/duration.proto";

option go_package = "github.com/agnt5dev/runtime/gen/go/agnt5/protocol/v2;protocolv2";

// ProtocolErrorCode is stable across gRPC and endpoint HTTP transports. It
// reports protocol-state failures without exposing partition, projection, or
// storage topology.
enum ProtocolErrorCode {
  PROTOCOL_ERROR_CODE_UNSPECIFIED = 0;
  PROTOCOL_ERROR_CODE_INVALID_EXECUTION_TOKEN = 1;
  PROTOCOL_ERROR_CODE_STALE_EXECUTION_TOKEN = 2;
  PROTOCOL_ERROR_CODE_STALE_WORKER_SESSION = 3;
  PROTOCOL_ERROR_CODE_EXECUTION_SUPERSEDED = 4;
  PROTOCOL_ERROR_CODE_INVALID_RUN_TRANSITION = 5;
  PROTOCOL_ERROR_CODE_WAIT_ALREADY_RESOLVED = 6;
  PROTOCOL_ERROR_CODE_ALREADY_COMMITTED = 7;
  PROTOCOL_ERROR_CODE_COMMIT_CONFLICT = 8;
  PROTOCOL_ERROR_CODE_UNSUPPORTED_PROTOCOL = 9;
  PROTOCOL_ERROR_CODE_MISSING_CAPABILITY = 10;
  PROTOCOL_ERROR_CODE_PAYLOAD_REFERENCE_EXPIRED = 11;
  PROTOCOL_ERROR_CODE_MESSAGE_TOO_LARGE = 12;
  PROTOCOL_ERROR_CODE_MANIFEST_REVISION_MISMATCH = 13;
  PROTOCOL_ERROR_CODE_INVALID_REQUEST = 14;
  PROTOCOL_ERROR_CODE_UNAUTHENTICATED = 15;
  PROTOCOL_ERROR_CODE_BACKPRESSURE = 16;
  PROTOCOL_ERROR_CODE_UNAVAILABLE = 17;
  PROTOCOL_ERROR_CODE_INVALID_DURABLE_OPERATION_TOKEN = 18;
  PROTOCOL_ERROR_CODE_STALE_DURABLE_OPERATION_TOKEN = 19;
  PROTOCOL_ERROR_CODE_STATE_REVISION_CONFLICT = 20;
  PROTOCOL_ERROR_CODE_STATE_SCOPE_UNAVAILABLE = 21;
  PROTOCOL_ERROR_CODE_COMPONENT_DESCRIPTOR_CONFLICT = 22;
}

message ProtocolError {
  ProtocolErrorCode code = 1;
  string message = 2;
  bool retryable = 3;
  google.protobuf.Duration retry_after = 4;
  map<string, string> details = 5;
}
