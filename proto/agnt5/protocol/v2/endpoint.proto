syntax = "proto3";

package agnt5.protocol.v2;

import "agnt5/protocol/v2/capabilities.proto";
import "agnt5/protocol/v2/common.proto";
import "agnt5/protocol/v2/component.proto";
import "agnt5/protocol/v2/dispatch.proto";
import "agnt5/protocol/v2/durable.proto";
import "agnt5/protocol/v2/run_policy.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/agnt5dev/runtime/gen/go/agnt5/protocol/v2;protocolv2";

// Endpoints implement this contract over signed HTTP JSON. They do not
// implement WorkerService and do not create a persistent worker session.
// Endpoints may be hosted on a serverless platform, container runtime, or
// ordinary HTTP server.
//
// Canonical HTTP operations:
//   GET  /.well-known/agnt5 -> EndpointManifest
//   POST /agnt5/invoke      -> InvokeEndpointRequest/Response
//
// The JSON mapping preserves the proto field names (snake_case). Invoke
// requests are authenticated by transport headers; the body carries no
// deployment, project, provider, or object-store identity.

message EndpointManifest {
  ProtocolVersion minimum_protocol = 1;
  ProtocolVersion maximum_protocol = 2;
  string service_name = 3;
  string service_version = 4;
  repeated Capability capabilities = 5;
  repeated ComponentDescriptor components = 6;
  // Named schemes are independently versioned. The initial interoperable
  // value is "agnt5-http-hmac-sha256.v1".
  repeated string request_signature_schemes = 7;
  // Immutable revision of this discovered manifest and executable component
  // set. Invocations pin the revision they were prepared against.
  string manifest_revision = 8;
  repeated string supported_content_encodings = 9;
  ProtocolLimits limits = 10;
}

// ExecutionBudget lets an endpoint yield before its host terminates the
// request. deadline is the runtime's absolute deadline; yield_before_timeout
// is the safety margin the SDK should reserve for serializing its response.
message ExecutionBudget {
  google.protobuf.Timestamp deadline = 1;
  google.protobuf.Duration yield_before_timeout = 2;
  uint32 maximum_steps = 3;
}

message InvokeEndpointRequest {
  ProtocolVersion protocol = 1;
  // Stable for retries of the same logical HTTP request. It is an idempotency
  // and tracing key, not a durable resource or authorization token.
  string execution_id = 2;
  string run_id = 3;
  ComponentTarget target = 4;
  Payload input = 5;
  Payload checkpoint = 6;
  // Retry attempt for user code. Retrying the same HTTP request does not
  // increment this value.
  uint32 attempt = 7;
  ExecutionBudget budget = 8;
  TraceContext trace_context = 9;
  map<string, string> metadata = 10;
  string manifest_revision = 11;
  // Previously accepted results supplied for deterministic SDK replay without
  // re-running completed durable operations.
  repeated DurableOperationResult replay_results = 12;
  // Runtime-resolved policy pinned to this invocation. Scheduling fields are
  // runtime-enforced; future execution-local security fields are enforced by
  // endpoints that negotiated the corresponding capability.
  RunPolicy effective_run_policy = 13;
  // Opaque runtime-computed fingerprint covered by endpoint request signing.
  // Clients must not recompute or interpret it.
  bytes effective_run_policy_digest = 14;
  // Persisted application identity inherited from StartRunRequest.
  ApplicationContext application_context = 15;
}

message InvokeEndpointResponse {
  // Events are durably appended by the runtime as part of accepting this
  // lease-fenced result. Clients stream them from the runtime, not directly
  // from the endpoint.
  repeated DurableEvent events = 1;
  RunOutcome outcome = 2;
  // Runtime-owned operations that the endpoint discovered during deterministic
  // execution. The endpoint yields; the runtime applies these operations and
  // reinvokes it with their results in replay_results.
  repeated DurableOperation requested_operations = 3;
  // SDK-owned operations, such as newly completed memoized steps, whose
  // operation and result are accepted in the invocation's fenced transaction.
  repeated DurableOperationRecord completed_operations = 4;
}
